version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: grindforge-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: grindforge-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  server:
    build:
      context: ./Server
    container_name: grindforge-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/grindforge
      CLIENT_ORIGIN: http://localhost:8080
      JWT_ACCESS_SECRET: replace-me-access-secret
      JWT_REFRESH_SECRET: replace-me-refresh-secret
      JWT_ACCESS_TTL_MS: 900000
      JWT_REFRESH_TTL_MS: 604800000
      SECURE_COOKIES: false
      COOKIE_SAME_SITE: lax
      GEMINI_API_KEY: ''
      GEMINI_BASE_URL: https://generativelanguage.googleapis.com/v1beta
      GEMINI_MODEL: gemini-1.5-flash
      GEMINI_TIMEOUT_MS: 20000
      AI_COACH_FALLBACK_ONLY: true
      REALTIME_ENABLED: true
      SOCKET_PATH: /socket.io
      REALTIME_REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis
    ports:
      - '4000:4000'

  client:
    build:
      context: ./Client
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: grindforge-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '8080:80'

volumes:
  mongo_data:
